<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact - Juan Chica</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <h2 id="logo">Juan Chica</h2>
      <ul class="navigation-items">
        <li class="navigation-item"><a href="/index.html">Home</a></li>
        <li class="navigation-item"><a href="projects.html">Projects</a></li>
        <li class="navigation-item"><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>

    <main>
      <section id="contact">
        <h2>Contact Me</h2>
        <p>If you'd like to work together or have any questions, feel free to reach out!</p>
        <form action="https://formspree.io/f/xblynbqq" method="POST" class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="_replyto" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send</button>
        </form>
      </section>
    </main>
  </body>
</html>
